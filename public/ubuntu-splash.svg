<svg width="400" height="600" viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#77216ed2"/>

  <!-- Scale wrapper -->
  <g transform="translate(200,300) scale(0.6) translate(-200,-300)">
    
    <!-- Ubuntu logo (simplified) -->
    <g transform="translate(200,230) scale(0.6)">
      <circle r="40" stroke="#E95420" stroke-width="10" fill="none" stroke-dasharray="60 20"/>
      <circle cx="0" cy="-50" r="8" fill="#E95420"/>
      <circle cx="43" cy="25" r="8" fill="#E95420"/>
      <circle cx="-43" cy="25" r="8" fill="#E95420"/>
    </g>

    <!-- Spinner -->
    <g transform="translate(200,300) scale(0.6)">
      <circle r="18" stroke="#777" stroke-width="4" opacity="0.3"/>
      
      <circle r="18"
              stroke="#ffffff"
              stroke-width="4"
              stroke-linecap="round"
              stroke-dasharray="30 90">
        <animateTransform
          attributeName="transform"
          type="rotate"
          from="0"
          to="360"
          dur="1s"
          repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Ubuntu text -->
    <g transform="translate(130,380) scale(0.7)">
      <rect x="0" y="-20" width="40" height="40" fill="#E95420"/>
      <circle cx="20" cy="0" r="10" stroke="white" stroke-width="2" fill="none"/>
      
      <text x="55" y="10"
            font-family="Ubuntu, Arial, sans-serif"
            font-size="36"
            fill="#ffffff">
        Ubuntu
      </text>
    <text x="0" y="80" fill="#ecececff" font-family="monospace" font-size="10" text-anchor="start" opacity="0">
      [ OK ] Reached target Basic System.
      <animate attributeName="opacity" values="0; 1; 1" keyTimes="0; 0.1; 1" dur="10s" begin="0.5s" fill="freeze" />
    </text>
    <text x="0" y="100" fill="#ecececff" font-family="monospace" font-size="10" text-anchor="start" opacity="0">
      [ OK ] Found device /dev/sda1.
      <animate attributeName="opacity" values="0; 1; 1" keyTimes="0; 0.1; 1" dur="10s" begin="1.2s" fill="freeze" />
    </text>
    <text x="0" y="120" fill="#ecececff" font-family="monospace" font-size="10" text-anchor="start" opacity="0">
      [ OK ] Started Ubuntu backup drivers. 
      <animate attributeName="opacity" values="0; 1; 1" keyTimes="0; 0.1; 1" dur="10s" begin="2.5s" fill="freeze" />
    </text>
    </g>

  </g>
</svg>