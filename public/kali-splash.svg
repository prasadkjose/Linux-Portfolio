<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="100%" height="100%" fill="#0b0f14"/>
  <g transform="translate(90,100) scale(0.4)">

  <defs>
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur1" />
      <feGaussianBlur stdDeviation="10" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8baaff" />
      <stop offset="40%" stop-color="#3b66ff" />
      <stop offset="100%" stop-color="#051055" />
    </linearGradient>

    <linearGradient id="wingGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#aaccff" />
      <stop offset="50%" stop-color="#4477ff" />
      <stop offset="100%" stop-color="#0a1a88" />
    </linearGradient>
  </defs>

  <g transform="translate(430, 230) scale(1.05)" filter="url(#neon-glow)">
    
    <animateTransform attributeName="transform" type="scale" values="1.04; 1.06; 1.04" dur="5s" repeatCount="indefinite" />
    <animateTransform attributeName="transform" type="translate" values="430,230; 430,225; 430,230" dur="5s" repeatCount="indefinite" additive="sum"/>

   
  </g>

  <g transform="translate(0, 450)">
    
    <rect x="250" y="30" width="300" height="4" fill="#111111" rx="2" />

    <rect x="250" y="30" width="0" height="4" fill="#4477ff" rx="2" filter="url(#neon-glow)">
      <animate attributeName="width" values="0; 150; 280; 300" keyTimes="0; 0.4; 0.8; 1" dur="4s" fill="freeze" />
    </rect>

    <text x="400" y="65" fill="#aaccff" font-family="monospace" font-weight="bold" font-size="18" text-anchor="middle" letter-spacing="4">
      KALI LINUX
      <animate attributeName="opacity" values="0.4; 1; 0.4" dur="2s" repeatCount="indefinite" />
    </text>
    
    <text x="400" y="85" fill="#555555" font-family="monospace" font-size="11" text-anchor="middle" letter-spacing="2">
      SYSTEM INITIALIZING...
    </text>

    <text x="50" y="115" fill="#335588" font-family="monospace" font-size="10" text-anchor="start" opacity="0">
      [ OK ] Reached target Basic System.
      <animate attributeName="opacity" values="0; 1; 1" keyTimes="0; 0.1; 1" dur="10s" begin="0.5s" fill="freeze" />
    </text>
    <text x="50" y="130" fill="#335588" font-family="monospace" font-size="10" text-anchor="start" opacity="0">
      [ OK ] Found device /dev/sda1.
      <animate attributeName="opacity" values="0; 1; 1" keyTimes="0; 0.1; 1" dur="10s" begin="1.2s" fill="freeze" />
    </text>
    <text x="50" y="145" fill="#335588" font-family="monospace" font-size="10" text-anchor="start" opacity="0">
      [ OK ] Started Cryptography Setup for luks-system.
      <animate attributeName="opacity" values="0; 1; 1" keyTimes="0; 0.1; 1" dur="10s" begin="2.5s" fill="freeze" />
    </text>
  </g>
  </g>

</svg>